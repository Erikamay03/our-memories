<!DOCTYPE html>
<html>

<head>

<title>Our Memories</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',century gothic;
margin:0;
color:white;
text-align:center;
min-height:100vh;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* LOGIN SCREEN */

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#loginScreen input{
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
width:200px;
text-align:center;
}

#loginScreen button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
}

/* NAV */

nav{
margin-top:20px;
}

nav button{
padding:12px 22px;
margin:5px;
border:none;
background:#ff4da6;
color:white;
border-radius:25px;
cursor:pointer;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.photo img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
}

/* CHAT */

#messageList{
max-width:600px;
margin:auto;
height:70vh;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
padding-bottom:100px;
}

.message{
padding:12px;
margin:10px;
border-radius:15px;
max-width:70%;
}

.left{
background:#2a2a33;
text-align:left;
}

.right{
background:#ff4da6;
margin-left:auto;
}

.name{
font-weight:bold;
}

.time{
font-size:11px;
opacity:0.7;
}

/* CHAT BAR */

.chatInput{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1c1c24;
padding:10px;
display:flex;
gap:10px;
justify-content:center;
align-items:center;
}

.chatInput textarea{
width:45%;
height:40px;
resize:none;
border-radius:10px;
padding:8px;
border:none;
}

.chatInput input{
width:120px;
padding:8px;
border-radius:10px;
border:none;
}

.chatInput button{
background:#ff4da6;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:768px){

.gallery{
grid-template-columns:1fr;
}

.photo img{
height:auto;
}

#messageList{
height:65vh;
width:95%;
}

.chatInput textarea{
width:40%;
}

}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<h1>❤️ Our Memories ❤️</h1>

<p>Enter Password</p>

<input type="password" id="passwordInput">

<button onclick="checkPassword()">Open</button>

</div>

<!-- WEBSITE CONTENT -->

<div id="mainSite" style="display:none;">

<nav>

<button onclick="showPage('gallery')">Gallery</button>
<button onclick="showPage('messages')">Messages</button>
<button onclick="showPage('letters')">Love Letters</button>
<button onclick="showPage('timeline')">Timeline</button>

</nav>

<!-- GALLERY -->

<div id="gallery">

<h1>❤️ Our Memories ❤️</h1>
<h2 id="counter"></h2>

<div class="gallery">

<div class="photo">
<img src="pic1.jpg">
<p>The One With The Ring</p>
</div>

<div class="photo">
<img src="pic2.jpg">
<p>The One Where We Painted Together</p>
</div>

<div class="photo">
<img src="pic3.jpg">
<p>The One In The Log House</p>
</div>

<div class="photo">
<img src="pic4.jpg">
<p>The One With Too Much Caffeine</p>
</div>

</div>

</div>

<!-- CHAT -->

<div id="messages" style="display:none">

<h1>Chat ❤️</h1>

<div id="messageList"></div>

<div class="chatInput">

<input id="messageName" placeholder="Your name">

<textarea id="messageBox" placeholder="Type a message..."></textarea>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<!-- LOVE LETTERS -->

<div id="letters" style="display:none">

<h1>Love Letters 💌</h1>

<input id="letterName" placeholder="Your name">

<br>

<textarea id="letterBox"></textarea>

<br>

<button onclick="sendLetter()">Save Letter</button>

<div id="letterList"></div>

</div>

</div>

<script>

/* PASSWORD SYSTEM */

function checkPassword(){

var password="111924";

var input=document.getElementById("passwordInput").value;

if(input===password){

document.getElementById("loginScreen").style.display="none";
document.getElementById("mainSite").style.display="block";

}else{

document.body.style.background="black";

}

}

</script>

</body>
</html>
