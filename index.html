<!DOCTYPE html>
<html>

<head>

<title>Our Memories</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
color:white;
text-align:center;
min-height:100vh;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* NAV */

nav{
margin-top:20px;
}

nav button{
padding:12px 22px;
margin:5px;
border:none;
background:#ff4da6;
color:white;
border-radius:25px;
cursor:pointer;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.photo img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
}

/* CHAT */

#messageList{
max-width:600px;
margin:auto;
height:70vh;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
padding-bottom:100px;
}

.message{
padding:12px;
margin:10px;
border-radius:15px;
max-width:70%;
}

.left{
background:#2a2a33;
text-align:left;
}

.right{
background:#ff4da6;
margin-left:auto;
}

.name{
font-weight:bold;
}

.time{
font-size:11px;
opacity:0.7;
}

/* CHAT INPUT */

.chatInput{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1c1c24;
padding:10px;
display:flex;
gap:10px;
justify-content:center;
align-items:center;
}

.chatInput textarea{
width:45%;
height:40px;
resize:none;
border-radius:10px;
padding:8px;
border:none;
}

.chatInput input{
width:120px;
padding:8px;
border-radius:10px;
border:none;
}

.chatInput button{
background:#ff4da6;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

/* ENVELOPE */

.envelope{
width:260px;
height:180px;
margin:20px auto;
position:relative;
cursor:pointer;
perspective:1000px;
}

.envelopeBody{
width:100%;
height:100%;
background:#ff4da6;
border-radius:6px;
position:absolute;
}

.envelopeFlap{
position:absolute;
top:0;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-top:90px solid #ff6aa8;
transform-origin:top;
transition:transform 0.6s;
}

.letter{
position:absolute;
top:20px;
left:10px;
width:240px;
height:140px;
background:#fffaf0;
color:black;
padding:15px;
box-sizing:border-box;
border-radius:6px;
transform:translateY(80px);
opacity:0;
transition:all 0.6s;
font-size:14px;
text-align:left;
}

/* OPEN STATE */

.envelope.open .envelopeFlap{
transform:rotateX(180deg);
}

.envelope.open .letter{
transform:translateY(-10px);
opacity:1;
}

/* MOBILE */

@media (max-width:768px){

.gallery{
grid-template-columns:1fr;
}

.photo img{
height:auto;
}

#messageList{
height:65vh;
width:95%;
}

.chatInput textarea{
width:40%;
}

}

</style>

</head>

<body>

<script>

var password="111924";
var user=prompt("Enter password ❤️");

if(user!==password){
document.body.innerHTML="";
document.body.style.background="black";
}

</script>

<nav>

<button onclick="showPage('gallery')">Gallery</button>
<button onclick="showPage('messages')">Messages</button>
<button onclick="showPage('letters')">Love Letters</button>
<button onclick="showPage('timeline')">Timeline</button>

</nav>

<!-- GALLERY -->

<div id="gallery">

<h1>❤️ Our Memories ❤️</h1>
<h2 id="counter"></h2>

<div class="gallery">

<div class="photo">
<img src="pic1.jpg">
<p>The One With The Ring</p>
</div>

<div class="photo">
<img src="pic2.jpg">
<p>The One Where We Painted Together</p>
</div>

<div class="photo">
<img src="pic3.jpg">
<p>The One In The Log House</p>
</div>

<div class="photo">
<img src="pic4.jpg">
<p>The One With Too Much Caffeine</p>
</div>

</div>

</div>

<!-- CHAT -->

<div id="messages" style="display:none">

<h1>Chat ❤️</h1>

<div id="messageList"></div>

<div class="chatInput">

<input id="messageName" placeholder="Your name">

<textarea id="messageBox" placeholder="Type a message..."></textarea>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<!-- LOVE LETTERS -->

<div id="letters" style="display:none">

<h1>Love Letters 💌</h1>

<input id="letterName" placeholder="Your name">

<br>

<textarea id="letterBox"></textarea>

<br>

<button onclick="sendLetter()">Save Letter</button>

<div id="letterList"></div>

</div>

<!-- TIMELINE -->

<div id="timeline" style="display:none">

<h1>Our Story ❤️</h1>

<p>Nov 19 2024 — We started dating ❤️</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {getFirestore,collection,addDoc,onSnapshot,query,orderBy}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA5uQg4d-pknrFttsbPx9wG4nsAVtjxNlI",
authDomain:"our-memories-66277.firebaseapp.com",
projectId:"our-memories-66277",
storageBucket:"our-memories-66277.firebasestorage.app",
messagingSenderId:"1036736307666",
appId:"1:1036736307666:web:4d96e6bb4ae2b7bbc0680b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* SEND MESSAGE */

window.sendMessage=async function(){

const name=document.getElementById("messageName").value;
const text=document.getElementById("messageBox").value;

if(text.trim()=="") return;

await addDoc(collection(db,"messages"),{
name:name,
message:text,
time:new Date()
});

document.getElementById("messageBox").value="";
}

/* REALTIME CHAT */

const q=query(collection(db,"messages"),orderBy("time","asc"));

onSnapshot(q,(snapshot)=>{

const list=document.getElementById("messageList");

list.innerHTML="";

snapshot.forEach(doc=>{

const data=doc.data();
const div=document.createElement("div");
const date=new Date(data.time.seconds*1000);

div.className="message "+(data.name=="Erika"?"right":"left");

div.innerHTML=
"<div class='name'>"+data.name+"</div>"+
"<div>"+data.message+"</div>"+
"<div class='time'>"+date.toLocaleString()+"</div>";

list.appendChild(div);

});

list.scrollTop=list.scrollHeight;

});

/* SEND LETTER */

window.sendLetter=async function(){

const name=document.getElementById("letterName").value;
const text=document.getElementById("letterBox").value;

if(text.trim()=="") return;

await addDoc(collection(db,"letters"),{
name:name,
letter:text,
time:new Date()
});

document.getElementById("letterBox").value="";
}

/* REALTIME ENVELOPE LETTERS */

const letterQuery=query(collection(db,"letters"),orderBy("time","asc"));

onSnapshot(letterQuery,(snapshot)=>{

const list=document.getElementById("letterList");

list.innerHTML="";

snapshot.forEach(doc=>{

const data=doc.data();
const date=new Date(data.time.seconds*1000);

const envelope=document.createElement("div");

envelope.className="envelope";

envelope.innerHTML=
"<div class='envelopeBody'></div>"+
"<div class='envelopeFlap'></div>"+
"<div class='letter'>"+
"<b>"+data.name+"</b><br><br>"+
data.letter+
"<br><br><small>"+date.toLocaleString()+"</small>"+
"</div>";

envelope.onclick=function(){
envelope.classList.toggle("open");
}

list.appendChild(envelope);

});

});

</script>

<script>

/* ENTER SEND */

document.addEventListener("keydown",function(e){

if(e.key==="Enter" && document.activeElement.id==="messageBox"){
e.preventDefault();
sendMessage();
}

});

/* PAGE SWITCH */

function showPage(page){

document.getElementById("gallery").style.display="none";
document.getElementById("messages").style.display="none";
document.getElementById("letters").style.display="none";
document.getElementById("timeline").style.display="none";

document.getElementById(page).style.display="block";

}

/* ANNIVERSARY COUNTER */

const startDate=new Date("2024-11-19");
const today=new Date();
const diff=Math.floor((today-startDate)/(1000*60*60*24));

document.getElementById("counter").innerText=
"We have been together for "+diff+" days ❤️";

</script>

</body>
</html>
